# Netlify build config for the Scribble frontend (Vite + React Router SPA).
# Routing (API proxy + SPA fallback) lives in public/_redirects — Netlify
# processes that file before netlify.toml, so keeping the rules there prevents
# the SPA catch-all from shadowing the API proxy.
[build]
  command = "npm run build"
  publish = "dist"
